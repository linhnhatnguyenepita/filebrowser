services:
  backend:
    build:
      context: ../
      dockerfile: container/Dockerfile.backend
    env_file:
      - .env
    expose:
      - "8080"
    ports:
      - "8080:8080"
    volumes:
      - ./data:/home/filebrowser/data
      - ./data/config.yaml:/home/filebrowser/config.yaml:ro
      - /home/nlnguyen:/srv
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: ../container/Dockerfile.frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://backend:8080
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/public:/app/public
    depends_on:
      - backend
    restart: unless-stopped
