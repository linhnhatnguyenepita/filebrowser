services:
  backend:
    build:
      context: ../
      dockerfile: container/Dockerfile.backend
    env_file:
      - .env
    expose:
      - "8080"
    ports:
      - "8080:8080"
    volumes:
      - ./data:/home/filebrowser/data
      - ./data/config.yaml:/home/filebrowser/config.yaml:ro
      - /home/nlnguyen:/srv
    restart: unless-stopped

  frontend:
    build:
      context: ../
      dockerfile: container/Dockerfile.frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
