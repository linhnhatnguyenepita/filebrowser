# =============================================================================
# Nginx Reverse Proxy Configuration
# =============================================================================
# Routes traffic:
#   /api/*  -> filebrowser-backend:8080 (Go API)
#   /public/* -> filebrowser-backend:8080
#   /dav/*  -> filebrowser-backend:8080
#   /health -> filebrowser-backend:8080
#   /*      -> filebrowser-frontend:3000 (React SPA)
# =============================================================================

worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /dev/stdout main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/font-woff
        application/font-woff2
        image/svg+xml;

    # Upstream: Go backend (API server)
    upstream filebrowser_backend {
        server filebrowser-backend:8080;
        keepalive 32;
    }

    # Upstream: React SPA (static files server)
    upstream filebrowser_frontend {
        server filebrowser-frontend:3000;
        keepalive 16;
    }

    server {
        listen 80 default_server;
        server_name _;

        # Health check -> Go backend
        location /health {
            proxy_pass http://filebrowser_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Connection "";
        }

        # API routes -> Go backend (port 8080)
        location /api/ {
            proxy_pass http://filebrowser_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # Public routes -> Go backend (port 8080)
        location /public/ {
            proxy_pass http://filebrowser_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # WebDAV routes -> Go backend (port 8080)
        location /dav/ {
            proxy_pass http://filebrowser_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # SPA fallback -> React frontend (port 3000)
        location / {
            proxy_pass http://filebrowser_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }
    }
}
